<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1B3B6F"/>
      <stop offset="100%" stop-color="#2E5FA3"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E8C547"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bgGrad)"/>
  <!-- Map pin body (teardrop) -->
  <ellipse cx="16" cy="13" rx="6.5" ry="6.5" fill="url(#pinGrad)"/>
  <!-- Pin tail -->
  <path d="M12.8 17.5 Q16 25 19.2 17.5" fill="url(#pinGrad)"/>
  <!-- Pin inner circle (hole) -->
  <circle cx="16" cy="13" r="2.4" fill="#1B3B6F"/>
  <!-- "M" lettermark inside hole -->
  <text x="16" y="16.5" text-anchor="middle"
        font-size="3.8" font-weight="900"
        font-family="Arial Black, Arial, sans-serif"
        fill="#D4AF37" letter-spacing="-0.2">M</text>
</svg>